name: CI — hurl-skill

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hurl
        run: |
          curl -LO https://github.com/Orange-OpenSource/hurl/releases/latest/download/hurl-x86_64-unknown-linux-gnu.tar.gz
          tar xzf hurl-x86_64-unknown-linux-gnu.tar.gz
          sudo mv hurl /usr/local/bin/hurl
          hurl --version

      - name: Validate example .hurl syntax
        run: |
          hurlfmt --check examples/H_EXAMPLE_API.hurl && echo "H_ OK"

      - name: Validate example vars file
        run: |
          test -f examples/V_EXAMPLE_API.env && echo "V_ OK"

      - name: Validate example pipeline YML
        run: |
          python3 -c "import yaml; yaml.safe_load(open('examples/Y_EXAMPLE_API_hurl.yml'))" && echo "Y_ OK"
